name: 🐛 Reportar bug
description: Algo não funciona como deveria
labels: [bug]
body:
  - type: textarea
    id: o-que-acontece
    attributes:
      label: O que está acontecendo?
      description: Descreva o problema. Print ou link ajudam muito.
    validations:
      required: true
  - type: textarea
    id: esperado
    attributes:
      label: O que você esperava que acontecesse?
    validations:
      required: true
  - type: textarea
    id: passos
    attributes:
      label: Como reproduzir
      description: Passo a passo pra fazer o bug aparecer.
      placeholder: |
        1. Abrir a página '...'
        2. Clicar em '...'
        3. Ver o erro
    validations:
      required: false
  - type: input
    id: onde
    attributes:
      label: Onde (página, navegador, celular/desktop)
    validations:
      required: false
