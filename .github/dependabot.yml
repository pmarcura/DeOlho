version: 2
updates:
  # Dependências do monorepo (pnpm na raiz cobre todos os workspaces).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      # Agrupa atualizações menores num único PR pra reduzir ruído.
      minor-e-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: chore(deps)

  # Atualiza as próprias GitHub Actions usadas no CI.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: chore(ci)
