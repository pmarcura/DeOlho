name: CI

# Porteiro automático: roda em todo PR e em pushes no main.
# Garante que toda contribuição instala, passa no lint, nos tipos e compila
# antes de poder entrar no "principal".
on:
  pull_request:
  push:
    branches: [main]

# Cancela execuções antigas do mesmo PR/branch quando chega um push novo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # lê a versão de "packageManager" no package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm -r build

  secrets:
    name: secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # histórico completo para o gitleaks varrer todos os commits

      - name: Gitleaks (varredura de segredos)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Grátis para repositórios públicos e pessoais (não precisa de licença).
          GITLEAKS_CONFIG: .gitleaks.toml
